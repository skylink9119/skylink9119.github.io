<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>动态背景测试 - Skyline博客</title>
    <link rel="stylesheet" href="/css/dynamic-background.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        
        .test-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .test-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #22d3ee, #ec4899, #8b5cf6);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
        }
        
        .test-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            animation: pulse 3s ease-in-out infinite;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .test-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .test-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(34, 211, 238, 0.4);
        }
        
        .test-card:hover::before {
            left: 100%;
        }
        
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #22d3ee;
        }
        
        .card-content {
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .test-controls {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: 16px;
            margin-top: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #ec4899;
        }
        
        .control-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(34, 211, 238, 0.2);
            border: 1px solid rgba(34, 211, 238, 0.4);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(34, 211, 238, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 211, 238, 0.3);
        }
        
        .test-instructions {
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .instructions-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #8b5cf6;
        }
        
        .instructions-list {
            list-style: none;
            line-height: 1.8;
        }
        
        .instructions-list li {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .instructions-list li::before {
            content: '🚀';
            position: absolute;
            left: 0;
        }
        
        /* 动态背景测试区域 */
        .background-test {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        /* 应用动态背景CSS中的样式 */
        .background-test {
            background: 
                linear-gradient(
                    135deg,
                    rgba(6, 12, 26, 0.95) 0%,
                    rgba(15, 23, 42, 0.9) 25%,
                    rgba(30, 41, 59, 0.85) 50%,
                    rgba(15, 23, 42, 0.9) 75%,
                    rgba(6, 12, 26, 0.95) 100%
                );
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }
        
        .background-test::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(
                    circle at 30% 30%,
                    rgba(34, 211, 238, 0.15) 0%,
                    transparent 50%
                ),
                radial-gradient(
                    circle at 70% 70%,
                    rgba(236, 72, 153, 0.1) 0%,
                    transparent 50%
                ),
                radial-gradient(
                    circle at 50% 20%,
                    rgba(139, 92, 246, 0.08) 0%,
                    transparent 50%
                );
            animation: gradientRotate 30s linear infinite;
            opacity: 0.6;
        }
        
        .background-test::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(34, 211, 238, 0.2) 2px, transparent 3px),
                radial-gradient(circle at 40% 70%, rgba(236, 72, 153, 0.15) 1px, transparent 2px),
                radial-gradient(circle at 60% 20%, rgba(139, 92, 246, 0.1) 3px, transparent 4px);
            background-size: 200px 200px;
            animation: float 20s ease-in-out infinite;
            opacity: 0.4;
        }
        
        @media (max-width: 768px) {
            .test-title {
                font-size: 2rem;
            }
            
            .test-grid {
                grid-template-columns: 1fr;
            }
            
            .background-test::before {
                animation: gradientRotate 40s linear infinite;
                opacity: 0.4;
            }
            
            .background-test::after {
                animation: float 30s ease-in-out infinite;
                opacity: 0.3;
            }
        }
    </style>
</head>
<body class="home">
    <!-- 动态背景 -->
    <div class="background-test"></div>
    
    <!-- 测试内容 -->
    <div class="test-container">
        <header class="test-header">
            <h1 class="test-title">动态背景效果测试</h1>
            <p class="test-subtitle">Skyline博客 - 渐变流动背景方案</p>
        </header>
        
        <div class="test-grid">
            <div class="test-card">
                <h2 class="card-title">渐变流动背景</h2>
                <p class="card-content">背景颜色在15秒内循环流动，创造深度感和动态效果。</p>
            </div>
            
            <div class="test-card">
                <h2 class="card-title">旋转光晕效果</h2>
                <p class="card-content">三个彩色光晕在背景中缓慢旋转，增加视觉层次。</p>
            </div>
            
            <div class="test-card">
                <h2 class="card-title">浮动粒子效果</h2>
                <p class="card-content">轻量级CSS粒子在背景中浮动，增强动态感。</p>
            </div>
        </div>
        
        <div class="test-controls">
            <h3 class="control-title">效果控制</h3>
            <div class="control-buttons">
                <button class="control-btn" onclick="toggleAnimation()">切换动画</button>
                <button class="control-btn" onclick="changeSpeed('faster')">加快速度</button>
                <button class="control-btn" onclick="changeSpeed('slower')">减慢速度</button>
                <button class="control-btn" onclick="toggleParticles()">切换粒子</button>
                <button class="control-btn" onclick="resetEffects()">重置效果</button>
            </div>
        </div>
        
        <div class="test-instructions">
            <h3 class="instructions-title">测试说明</h3>
            <ul class="instructions-list">
                <li>此页面测试动态背景CSS效果</li>
                <li>背景应显示渐变流动、光晕旋转和浮动粒子</li>
                <li>卡片应有悬浮效果和光扫描动画</li>
                <li>标题应有渐变色彩和呼吸效果</li>
                <li>使用上方按钮控制效果</li>
                <li>如果效果正常，说明动态背景CSS工作正常</li>
            </ul>
        </div>
    </div>
    
    <script>
        let animationEnabled = true;
        let particlesEnabled = true;
        let currentSpeed = 'normal';
        
        function toggleAnimation() {
            const background = document.querySelector('.background-test');
            if (animationEnabled) {
                background.style.animationPlayState = 'paused';
                document.querySelectorAll('.test-card').forEach(card => {
                    card.style.animationPlayState = 'paused';
                });
                animationEnabled = false;
                alert('动画已暂停');
            } else {
                background.style.animationPlayState = 'running';
                document.querySelectorAll('.test-card').forEach(card => {
                    card.style.animationPlayState = 'running';
                });
                animationEnabled = true;
                alert('动画已恢复');
            }
        }
        
        function changeSpeed(speed) {
            const background = document.querySelector('.background-test');
            let duration;
            
            switch(speed) {
                case 'faster':
                    duration = '8s';
                    currentSpeed = 'fast';
                    break;
                case 'slower':
                    duration = '25s';
                    currentSpeed = 'slow';
                    break;
                default:
                    duration = '15s';
                    currentSpeed = 'normal';
            }
            
            background.style.animationDuration = duration;
            alert(`动画速度已调整为: ${currentSpeed}`);
        }
        
        function toggleParticles() {
            const background = document.querySelector('.background-test');
            if (particlesEnabled) {
                background.style.opacity = '0.3';
                particlesEnabled = false;
                alert('粒子效果已减弱');
            } else {
                background.style.opacity = '0.7';
                particlesEnabled = true;
                alert('粒子效果已恢复');
            }
        }
        
        function resetEffects() {
            const background = document.querySelector('.background-test');
            background.style.animationPlayState = 'running';
            background.style.animationDuration = '15s';
            background.style.opacity = '0.7';
            
            animationEnabled = true;
            particlesEnabled = true;
            currentSpeed = 'normal';
            
            alert('所有效果已重置为默认');
        }
        
        // 初始提示
        window.addEventListener('load', () => {
            console.log('🚀 动态背景测试页面已加载');
            console.log('✅ 如果看到渐变流动、光晕旋转和浮动粒子，说明CSS效果正常');
            console.log('🔧 使用页面上的按钮测试效果控制');
        });
    </script>
</body>
</html>
