# --------------------------------------
# Chat Services
# --------------------------------------

chat:
  use:
  rightside_button: false
  button_hide_show: false

chatra:
  id:

tidio:
  public_key:

crisp:
  website_id:

# --------------------------------------
# Analysis
# --------------------------------------

baidu_analytics:
google_analytics:
cloudflare_analytics:
microsoft_clarity:

umami_analytics:
  enable: false
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    token:

google_tag_manager:
  tag_id:
  domain:

# --------------------------------------
# Advertisement
# --------------------------------------

google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

ad:
  index:
  aside:
  post:

# --------------------------------------
# Verification
# --------------------------------------

site_verification:
  # - name: google-site-verification
  #   content: xxxxxx

# --------------------------------------
# Beautify / Effect
# --------------------------------------

# Theme color for customize
# Notice: color value must in double quotes like "#000" or may cause error!

theme_color:
  enable: true
  main: "#4A90D9"
  paginator: "#4A90D9"
  button_hover: "#FF7242"
  text_selection: "#4A90D9"
  link_color: "#4A90D9"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#4A90D9"
  blockquote_padding_color: "#4A90D9"
  blockquote_background_color: "#4A90D9"
  scrollbar_color: "#4A90D9"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

# The user interface setting of category and tag page
category_ui:
tag_ui:

# Rounded corners for UI elements
rounded_corners_ui: true

# Stretches the lines so that each line has equal width
text_align_justify: false

# Add a mask to the header and footer
mask:
  header: true
  footer: true

# Loading Animation
preloader:
  enable: true
  source: 2
  pace_css_url:

# Page Transition
enter_transitions: true

# Default display mode - light (default) / dark
display_mode: light

# Configuration for beautifying the content of the article
beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: "#4A90D9"

# Global font settings
font:
  global_font_size:
  code_font_size:
  font_family: "'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
  code_font_family:

# Font settings for the site title and site subtitle
blog_title_font:
  font_link: https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap
  font_family: "'Noto Sans SC', sans-serif"

# The setting of divider icon
hr_icon:
  enable: true
  icon: '\f005'
  icon_top:

# Typewriter Effect
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# Background effects
canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

canvas_fluttering_ribbon:
  enable: false
  mobile: false

canvas_nest:
  enable: false
  color: '0,0,255'
  opacity: 0.7
  zIndex: -1
  count: 99
  mobile: false

# Mouse click effects: fireworks
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# Mouse click effects: Heart symbol
click_heart:
  enable: false
  mobile: false

# Mouse click effects: words
clickShowText:
  enable: false
  text:
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# Lightbox Settings
# --------------------------------------

lightbox: medium_zoom

# --------------------------------------
# Tag Plugins settings
# --------------------------------------

series:
  enable: false
  orderBy: 'title'
  order: 1
  number: true

abcjs:
  enable: false
  per_page: true

mermaid:
  enable: false
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

chartjs:
  enable: false
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

# --------------------------------------
# Other Settings
# --------------------------------------

pjax:
  enable: true
  exclude:
    # - /xxxxxx/

aplayerInject:
  enable: false
  per_page: true

snackbar:
  enable: true
  position: bottom-left
  bg_light: '#4A90D9'
  bg_dark: '#1f1f1f'

instantpage: true

lazyload:
  enable: true
  native: false
  field: site
  placeholder:
  blur: false

pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

Open_Graph_meta:
  enable: true
  option:

structured_data:
  enable: true
  alternate_name:

css_prefix: true

inject:
  head:
    # - <link rel="stylesheet" href="/xxx.css">
  bottom:
    # - <script src="xxxx"></script>

# CDN Settings
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
  custom_format:
  option:
