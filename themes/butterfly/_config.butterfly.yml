# --------------------------------------
# Hexo Butterfly Theme Configuration (优化版)
# 文档: https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true   # ✅ 优化：导航栏固定在顶部，提升用户体验

menu:
  首页: / || fas fa-home
  文章: /archives/ || fas fa-book-open
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  # 测试脚本: /script/ || fas fa-terminal  # 如需保留测试页面请取消注释

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  theme: darker         # ✅ 优化：deeper 暗色主题，更好看
  macStyle: true        # ✅ 优化：macOS 风格代码块标题栏
  height_limit: 400     # ✅ 优化：超长代码折叠，页面更简洁
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# --------------------------------------
# 社交链接（按需填写）
# --------------------------------------

social:
  fab fa-github: https://github.com/skylink9119 || Github || '#24292e'
  fas fa-envelope: mailto:sky13712559955@gmail.com || Email || '#4a7dbe'

# --------------------------------------
# 图片设置
# --------------------------------------

favicon: /img/favicon.png

avatar:
  img: /img/icon.jpg
  effect: false

disable_top_img: false
default_top_img:
index_img: /img/home-bg2.jpg
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
footer_img: false
background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# ✅ 优化：启用自定义 404 页面
error_404:
  enable: true
  subtitle: '页面找不到了'
  background: /img/error-page.png

# --------------------------------------
# 文章元信息设置
# --------------------------------------

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

index_site_info_top:
index_top_img_height:

# ✅ 优化：开启首页打字机副标题效果
subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
    - '记录生活，分享技术'
    - '欢迎来到我的博客'

index_layout: 3

index_post_content:
  method: 2       # ✅ 优化：优先显示自定义摘要，否则自动截取
  length: 300

# --------------------------------------
# 文章页设置
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: true    # ✅ 优化：目录默认展开，方便阅读
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/skylink9119
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  text:
  QR_code:

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# ✅ 优化：超过 365 天的文章显示过时提醒
noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 本文已有
  message_next: 天未更新，内容可能已过时，请以最新资料为准。

# --------------------------------------
# 页脚设置
# --------------------------------------

footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:
  beautify: true

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: false    # ✅ 优化：移动端关闭侧边栏，节省空间
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: '热爱技术与生活'   # ✅ 优化：填写作者简介
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/skylink9119
  card_announcement:
    enable: true
    content: '欢迎来到我的博客！这里记录技术笔记与生活点滴。'   # ✅ 优化：更有意义的公告
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true    # ✅ 优化：标签彩色显示
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月   # ✅ 优化：中文格式
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date:

# --------------------------------------
# 右下角按钮
# --------------------------------------

rightside_bottom:

translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

# ✅ 优化：暗黑模式跟随系统
darkmode:
  enable: true
  button: true
  autoChangeMode: 1   # 跟随系统深色模式
  start:
  end:

rightside_scroll_percent: true   # ✅ 优化：右下角显示滚动进度

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  auto_update: true    # ✅ 优化：滚动时自动更新 URL
  click_to_scroll: true

photofigcaption: true   # ✅ 优化：显示图片标题

copy:
  enable: true
  copyright:
    enable: true         # ✅ 优化：复制时附加版权信息
    limit_count: 150

# ✅ 优化：开启字数统计（需安装 hexo-wordcount：npm install hexo-wordcount --save）
wordcount:
  enable: false   # 安装插件后改为 true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学公式（按需开启）
# --------------------------------------

math:
  use:
  per_page: true
  hide_scrollbar: false
  mathjax:
    enableMenu: true
    tags: none
  katex:
    copy_tex: false

# --------------------------------------
# 搜索设置
# --------------------------------------

# ✅ 优化：开启本地搜索
search:
  use: local_search
  placeholder: '搜索文章...'

  algolia_search:
    hitsPerPage: 6

  local_search:
    preload: true        # ✅ 优化：预加载搜索数据
    top_n_per_article: 2
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8
    CDN:

  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享设置
# --------------------------------------

share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统（按需配置一种）
# --------------------------------------

comments:
  use:
  text: true
  lazyload: true    # ✅ 优化：懒加载评论
  count: false
  card_post_count: false

disqus:
  shortname:
  apikey:

disqusjs:
  shortname:
  apikey:
  option:

livere:
  uid:

gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

valine:
  appId:
  appKey:
  avatar: monsterid
  serverURLs:
  bg:
  visitor: false
  option:

waline:
  serverURL:
  bg:
  pageview: false
  option:

utterances:
  repo:
  issue_term: pathname
  light_theme: github-light
  dark_theme: photon-dark
  js:
  option:

facebook_comments:
  app_id:
  user_id:
  pageSize: 10
  order_by: social
  lang: zh_CN

twikoo:
  envId:
  region:
  visitor: false
  option:

giscus:
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

remark42:
  host:
  siteId:
  option:

artalk:
  server:
  site:
  visitor: false
  option:

# --------------------------------------
# 聊天服务（按需配置）
# --------------------------------------

chat:
  use:
  rightside_button: false
  button_hide_show: false

chatra:
  id:

tidio:
  public_key:

crisp:
  website_id:

# --------------------------------------
# 统计分析（按需配置）
# --------------------------------------

baidu_analytics:
google_analytics:
cloudflare_analytics:
microsoft_clarity:

umami_analytics:
  enable: false
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    token:

google_tag_manager:
  tag_id:
  domain:

# --------------------------------------
# 广告（默认关闭）
# --------------------------------------

google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

ad:
  index:
  aside:
  post:

# --------------------------------------
# 站点验证
# --------------------------------------

site_verification:
  # - name: google-site-verification
  #   content: xxxxxx

# --------------------------------------
# 美化 / 视觉效果
# --------------------------------------

# ✅ 优化：自定义主题色（清新蓝绿风格）
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#3b6be0"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

category_ui:
tag_ui:

rounded_corners_ui: true

text_align_justify: false

mask:
  header: true
  footer: true

# ✅ 优化：开启加载进度条
preloader:
  enable: true
  source: 2        # pace 进度条，更轻量
  pace_css_url:

enter_transitions: true

display_mode: light

# ✅ 优化：开启文章美化（给标题加图标）
beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: '#F47466'

# 字体设置（按需修改）
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

hr_icon:
  enable: true
  icon:
  icon_top:

activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# 背景特效（按需开启，建议只开一个）
canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

canvas_fluttering_ribbon:
  enable: false
  mobile: false

canvas_nest:
  enable: false
  color: '0,0,255'
  opacity: 0.7
  zIndex: -1
  count: 99
  mobile: false

fireworks:
  enable: false
  zIndex: 9999
  mobile: false

click_heart:
  enable: false
  mobile: false

clickShowText:
  enable: false
  text:
  fontSize: 16px
  random: false
  mobile: false

# --------------------------------------
# 图片灯箱
# --------------------------------------

# ✅ 优化：开启图片灯箱，点击图片放大查看
lightbox: medium_zoom

# --------------------------------------
# 标签插件设置
# --------------------------------------

series:
  enable: false
  orderBy: 'title'
  order: 1
  number: true

abcjs:
  enable: false
  per_page: true

mermaid:
  enable: false
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

chartjs:
  enable: false
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

# --------------------------------------
# 其他性能设置
# --------------------------------------

# ✅ 优化：开启 PJAX，页面切换更流畅（单页应用体验）
pjax:
  enable: true
  exclude:

aplayerInject:
  enable: false
  per_page: true

# ✅ 优化：开启 Snackbar 通知提示
snackbar:
  enable: true
  position: bottom-left
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# ✅ 优化：开启 instant.page，鼠标悬停即预加载
instantpage: true

# ✅ 优化：开启懒加载，加快首屏速度
lazyload:
  enable: true
  native: false
  field: site
  placeholder:
  blur: false

pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

Open_Graph_meta:
  enable: true
  option:

# ✅ 优化：开启结构化数据，有助于 Google 搜索展示
structured_data:
  enable: true
  alternate_name:

css_prefix: true

inject:
  head:
  bottom:

CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
  custom_format:
  option:
