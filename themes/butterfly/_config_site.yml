# ===== 站点基本信息 =====
title: skyline
subtitle: '记录生活，分享技术'
description: '一个热爱技术与生活的个人博客，分享编程、工具脚本和日常思考。'
keywords: 博客,技术,编程,脚本,skyline
author: sky
language: zh-CN
timezone: Asia/Shanghai

# ===== 网站 URL（部署前请改成你的真实域名！） =====
url: https://skylink9119.github.io   # ⚠️ 如有自定义域名请替换此处
root: /

permalink: :year/:month/:day/:title/

source_dir: source
public_dir: public

tag_dir: tags
archive_dir: archives
category_dir: categories

default_layout: post

theme: butterfly

# ===== 代码高亮 =====
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# ===== 首页文章数量 =====
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# ===== 搜索插件（需要安装 hexo-generator-searchdb） =====
search:
  path: search.xml
  field: post
  format: html
  limit: 10000
