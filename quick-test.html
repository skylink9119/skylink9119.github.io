<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>快速测试 - 粒子动画 + 渐变流动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* 渐变流动背景 */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(
                135deg,
                #0a0e1a 0%,
                #1a1f3a 25%,
                #2a2f5a 50%,
                #3a3f7a 75%,
                #4a4f9a 100%
            );
            background-size: 300% 300%;
            animation: gradientFlow 20s ease infinite;
        }
        
        /* 光晕效果 */
        .glow-effect {
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(34, 211, 238, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(236, 72, 153, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 40% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: rotateGlow 40s linear infinite;
            opacity: 0.5;
            filter: blur(60px);
        }
        
        /* 粒子画布 */
        #test-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* 动画定义 */
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        /* 测试内容 */
        .test-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
            text-align: center;
        }
        
        .test-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #22d3ee, #ec4899, #8b5cf6);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 6s linear infinite;
        }
        
        .test-subtitle {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            animation: float 3s ease-in-out infinite;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .test-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.4s ease;
        }
        
        .test-card:hover {
            transform: translateY(-10px);
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #22d3ee;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1s ease-in-out infinite;
        }
        
        .status-online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        
        .status-loading {
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .test-instructions {
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .instructions-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #ec4899;
        }
        
        .instructions-list {
            text-align: left;
            list-style: none;
            line-height: 1.8;
        }
        
        .instructions-list li {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .instructions-list li::before {
            content: '👉';
            position: absolute;
            left: 0;
        }
        
        @media (max-width: 768px) {
            .test-title {
                font-size: 2rem;
            }
            
            .test-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 渐变流动背景 -->
    <div class="gradient-bg"></div>
    
    <!-- 光晕效果 -->
    <div class="glow-effect"></div>
    
    <!-- 粒子画布 -->
    <canvas id="test-particles"></canvas>
    
    <!-- 测试内容 -->
    <div class="test-content">
        <h1 class="test-title">粒子动画 + 渐变流动测试</h1>
        <p class="test-subtitle">Skyline博客 - 终极动态背景效果</p>
        
        <div class="test-grid">
            <div class="test-card">
                <h3 class="card-title">
                    <span class="status-indicator status-online"></span>
                    渐变流动背景
                </h3>
                <p>背景颜色在20秒内循环流动，创造深度感和动态效果。</p>
            </div>
            
            <div class="test-card">
                <h3 class="card-title">
                    <span class="status-indicator status-online"></span>
                    光晕旋转效果
                </h3>
                <p>彩色光晕在背景中缓慢旋转，增加视觉层次。</p>
            </div>
            
            <div class="test-card">
                <h3 class="card-title">
                    <span class="status-indicator status-loading"></span>
                    粒子动画系统
                </h3>
                <p>彩色粒子在背景中浮动，鼠标移动时粒子会跟随。</p>
            </div>
        </div>
        
        <div class="test-instructions">
            <h3 class="instructions-title">测试说明</h3>
            <ul class="instructions-list">
                <li>此页面直接测试动态背景效果</li>
                <li>应该看到：渐变流动 + 光晕旋转 + 粒子动画</li>
                <li>移动鼠标测试粒子交互效果</li>
                <li>如果效果正常，说明动态背景系统工作正常</li>
                <li>如果只有部分效果，可能是某些文件未加载</li>
            </ul>
        </div>
    </div>
    
    <script>
        // 简单的粒子系统
        function initParticles() {
            const canvas = document.getElementById('test-particles');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 粒子配置
            const particles = [];
            const particleCount = 40;
            const colors = ['#22d3ee', '#ec4899', '#8b5cf6', '#10b981', '#f59e0b'];
            
            // 鼠标位置
            let mouse = { x: -1000, y: -1000, radius: 100 };
            
            // 创建粒子
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.opacity = Math.random() * 0.5 + 0.3;
                }
                
                update() {
                    // 边界处理
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                    
                    // 鼠标交互
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        const angle = Math.atan2(dy, dx);
                        this.speedX += Math.cos(angle) * 0.1;
                        this.speedY += Math.sin(angle) * 0.1;
                        this.opacity = 0.8;
                    } else {
                        this.opacity = Math.max(0.3, this.opacity - 0.01);
                    }
                    
                    // 应用运动
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    // 速度限制
                    this.speedX *= 0.99;
                    this.speedY *= 0.99;
                }
                
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    
                    // 渐变填充
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 2
                    );
                    gradient.addColorStop(0, this.color + 'FF');
                    gradient.addColorStop(1, this.color + '00');
                    
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }
            
            // 初始化粒子
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            // 动画循环
            function animate() {
                // 半透明清空（拖尾效果）
                ctx.fillStyle = 'rgba(10, 14, 26, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 更新和绘制粒子
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
                
                // 绘制连接线
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 100) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(34, 211, 238, ${0.2 * (1 - distance/100)})`;
                            ctx.lineWidth = 0.3;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            // 鼠标事件
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            
            window.addEventListener('mouseleave', () => {
                mouse.x = -1000;
                mouse.y = -1000;
            });
            
            // 启动动画
            animate();
            
            console.log('✅ 测试粒子系统已启动');
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            console.log('🚀 快速测试页面已加载');
            console.log('1. 应该看到渐变流动背景');
            console.log('2. 应该看到光晕旋转效果');
            console.log('3. 应该看到粒子动画');
            console.log('4. 移动鼠标测试粒子交互');
            
            initParticles();
        });
    </script>
</body>
</html>
